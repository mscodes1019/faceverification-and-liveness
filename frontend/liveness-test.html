<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liveness Test (Plain, No Verify)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; }
        #logs { background: #f5f5f5; padding: 10px; margin-top: 20px; border-radius: 4px; font-size: 12px; font-family: monospace; max-height: 400px; overflow-y: auto; }
        .log-line { margin: 2px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Liveness Test (Plain Session)</h1>
        <p>Tests plain liveness (without verify) to isolate the issue.</p>
        <button onclick="startTest()">Start Plain Liveness Test</button>
        <div id="logs"></div>
    </div>

    <script>
        const API = 'http://localhost:8000';
        let logs = [];
        
        function log(msg) {
            const ts = new Date().toISOString();
            logs.push(`[${ts}] ${msg}`);
            document.getElementById('logs').innerHTML = logs.map(l => `<div class="log-line">${l}</div>`).join('');
            document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
            console.log(msg);
        }

        async function startTest() {
            logs = [];
            log('=== PLAIN LIVENESS TEST START ===');
            
            try {
                // Create plain liveness session (no verify image)
                log('Creating plain liveness session...');
                let res = await fetch(API + '/api/liveness/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ livenessOperationMode: 'PassiveActive' })
                });
                let session = await res.json();
                
                if (!res.ok) {
                    throw new Error(`Failed to create session: ${JSON.stringify(session)}`);
                }
                
                log(`Session created: ${session.sessionId}`);
                log(`Auth token TTL: Check server logs`);
                log('NOW: Complete the liveness challenge in the detector below');
                log('Session will be polled for result in 5 seconds...');
                
                // Wait for user to complete challenge
                await new Promise(r => setTimeout(r, 5000));
                
                // Poll result
                log('Polling session result...');
                res = await fetch(API + '/api/liveness/session/' + session.sessionId + '/result');
                let result = await res.json();
                
                log(`Result status: ${result.decision || result.status}`);
                log(`Full result: ${JSON.stringify(result, null, 2)}`);
                
                if (result.decision === 'pass' || result.isLive) {
                    log('✅ LIVENESS PASSED');
                } else {
                    log('❌ LIVENESS FAILED');
                }
            } catch (e) {
                log(`ERROR: ${e.message}`);
            }
        }
    </script>
</body>
</html>
